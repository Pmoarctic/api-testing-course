info:
  name: GET Order
  type: http
  seq: 10

http:
  method: GET
  url: "{{baseUrl}}/orders/{{orderId}}"
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        if (res.getStatus() !== 200) {
          throw new Error(`Expected 200 from GET /orders/{orderId}, got ${res.getStatus()}`);
        }
        const data = res.getBody();
        if (data.orderId !== bru.getEnvVar("orderId")) throw new Error("orderId mismatch");
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.body.status
      operator: eq
      value: "'created'"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
