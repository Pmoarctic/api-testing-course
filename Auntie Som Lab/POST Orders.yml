info:
  name: POST Orders
  type: http
  seq: 5

http:
  method: POST
  url: "{{baseUrl}}/orders"
  body:
    type: json
    data: |-
      {
        "itemId": 1,
        "quantity": 1
      //   expected totalPrice = 50
      }
  auth:
    type: bearer
    token: "{{token}}"

runtime:
  scripts:
    - type: after-response
      code: |-
        if(res.getStatus() !== 200) {
          throw new Error(`Expected 200 from POST /orders, got ${res.getStatus()}`);
        }
        const data = res.getBody();
        if (data.orderId) {
          bru.setEnvVar("orderId", data.orderId);
        }

        // {
        //   "itemId": 1,
        //   "quantity": 1
        //   expected totalPrice = 50
        // }
        if (res.body.totalPrice !== 50){
          throw new Error(`Expected totalPrice is equal to 50`);
        }
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.body.orderId
      operator: isNotEmpty
    - expression: res.body.status
      operator: eq
      value: "'created'"
    - expression: res.body.totalPrice
      operator: eq
      value: "50"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
