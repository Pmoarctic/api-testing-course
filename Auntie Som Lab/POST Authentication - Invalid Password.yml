info:
  name: POST Authentication - Invalid Password
  type: http
  seq: 3

http:
  method: POST
  url: "{{baseUrl}}/auth/login"
  body:
    type: json
    data: |-
      {
        "username": "student",
        "password": "wadawdwadwa"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        if(res.getStatus() !== 401) {
          throw new Error(`Expected 401 from POST /auth/login with invalid password, got ${res.getStatus()}`);
        }
        const data = res.getBody();
        if(data.error != "Invalid login") throw new Error("Password must be invalid");
  assertions:
    - expression: res.status
      operator: eq
      value: "401"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
